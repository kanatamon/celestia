<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Celestia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #080e1f;
      color: #e8eaf6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px 24px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(32, 178, 170, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(100, 60, 200, 0.15) 0%, transparent 60%),
        #080e1f;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(32, 178, 170, 0.4);
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #7fffd4 0%, #20b2aa 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 36px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #20b2aa, #7c3aed);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 999px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 24px rgba(32, 178, 170, 0.35);
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .screenshot-wrap {
      max-width: 960px;
      width: 100%;
      margin-top: 56px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.06);
    }

    .screenshot-wrap img { width: 100%; display: block; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.8rem;
      color: #334155;
    }

    footer a { color: #475569; text-decoration: none; }
    footer a:hover { color: #94a3b8; }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <img class="logo" src="icon-128.png" alt="Celestia icon" />
      <h1>Celestia</h1>
      <a class="btn-primary" href="https://github.com/kanatamon/celestia/releases/download/v1.0.1/celestia-1.0.1.zip">
        ↓ Download
      </a>
      <div class="screenshot-wrap">
        <img src="hero.png" alt="Celestia screenshot" />
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>
      <a href="https://github.com/kanatamon/celestia">GitHub</a> ·
      <a href="privacy-policy.html">Privacy Policy</a>
    </p>
    <p style="margin-top: 8px;">© 2026 Celestia</p>
  </footer>

</body>
</html>
